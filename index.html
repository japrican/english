// ============================================================
// PWA SETUP (manifest + service worker + install prompt)
// ============================================================
(function() {
  // 1. manifest.json を動的に生成してリンク
  const manifest = {
    name: PWA_APP_NAME,
    short_name: PWA_APP_SHORT_NAME,
    description: PWA_APP_DESC,
    start_url: "./",
    display: "standalone",
    background_color: PWA_BG_COLOR,
    theme_color: PWA_THEME_COLOR,
    orientation: "portrait",
    icons: [
      { src: "data:image/png;base64," + PWA_ICON_192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: "data:image/png;base64," + PWA_ICON_512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const manifestURL = URL.createObjectURL(manifestBlob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = manifestURL;
  document.head.appendChild(link);

  // 2. iOS用のホーム画面アイコン・メタタグ
  const appleIcon = document.createElement('link');
  appleIcon.rel = 'apple-touch-icon';
  appleIcon.href = "data:image/png;base64," + PWA_ICON_192;
  document.head.appendChild(appleIcon);

  const metaCapable = document.createElement('meta');
  metaCapable.name = 'apple-mobile-web-app-capable';
  metaCapable.content = 'yes';
  document.head.appendChild(metaCapable);

  const metaStatusBar = document.createElement('meta');
  metaStatusBar.name = 'apple-mobile-web-app-status-bar-style';
  metaStatusBar.content = 'black-translucent';
  document.head.appendChild(metaStatusBar);

  const metaTitle = document.createElement('meta');
  metaTitle.name = 'apple-mobile-web-app-title';
  metaTitle.content = PWA_APP_SHORT_NAME;
  document.head.appendChild(metaTitle);

  const metaTheme = document.createElement('meta');
  metaTheme.name = 'theme-color';
  metaTheme.content = PWA_THEME_COLOR;
  document.head.appendChild(metaTheme);

  // 3. ホーム画面に追加していない場合に案内を表示（iOS Safari向け）
  function isInStandaloneMode() {
    return ('standalone' in window.navigator) && (window.navigator.standalone);
  }
  function isIOS() {
    return /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
  }

  function showInstallHint() {
    if (isInStandaloneMode()) return; // すでにホーム画面から起動している
    if (localStorage.getItem('pwa_install_hint_dismissed')) return;
    if (!isIOS()) return; // 今回はiOS Safari向けの案内のみ実装

    const hint = document.createElement('div');
    hint.id = 'pwa-install-hint';
    hint.style = `
      position: fixed; left: 16px; right: 16px; bottom: 56px;
      background: white; border: 2px solid ${PWA_THEME_COLOR};
      border-radius: 16px; padding: 14px 16px; z-index: 10000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      font-family: 'Zen Maru Gothic', sans-serif;
      display: flex; align-items: center; gap: 10px;
    `;
    hint.innerHTML = `
      <div style="flex:1; font-size:12px; line-height:1.6; color:#1c1c1a;">
        <strong>📲 ホーム画面に追加</strong>すると、アプリのように使えます。<br>
        下の<strong>共有ボタン</strong>（□と↑）→「ホーム画面に追加」をタップ。
      </div>
      <button id="pwa-hint-close" style="background:none;border:none;font-size:18px;cursor:pointer;color:#9ca3af;flex-shrink:0;">✕</button>
    `;
    document.body.appendChild(hint);
    document.getElementById('pwa-hint-close').onclick = function() {
      hint.remove();
      localStorage.setItem('pwa_install_hint_dismissed', 'true');
    };
  }

  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(showInstallHint, 2000);
  });
})();

</script>
<style>:root {
  --white: #ffffff;
  --off-white: #f8f8f6;
  --ink: #3f3f46;
  --gray: #6b6b68;
  --light-gray: #e8e8e4;

  --grade1-accent: #f9a8d4;
  --grade1-bg: #fdf2f8;
  --grade2-accent: #f472b6;
  --grade2-bg: #fdf2f8;
  --grade3-accent: #ec4899;
  --grade3-bg: #fdf2f8;

  --coral: #ff5e5b;
  --mint: #00c9a7;
  --yellow: #ffe135;
  --sky: #5bc8f5;
  --lavender: #a78bfa;

  --cur-accent: var(--grade1-accent);
  --cur-bg: var(--grade1-bg);

  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 3px 3px 0 var(--ink);
  --shadow-sm: 2px 2px 0 var(--ink);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--off-white);
  color: var(--ink);
  min-height: 100vh;
}
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

.app-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: #1c1c1a;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 3px solid var(--cur-accent);
}
.back-btn {
  background: none; border: 2px solid rgba(255,255,255,0.6); color: #ffffff;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; padding: 5px 12px; cursor: pointer;
  border-radius: 100px; transition: all 0.15s; flex-shrink: 0;
}
.back-btn:hover { border-color: #fde68a; color: #fde68a; }
.header-title {
  font-family: 'Noto Sans JP', sans-serif; font-size: 19px; font-weight: 700;
  color: #ffffff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header-badge {
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
  padding: 4px 10px; border-radius: 100px; background: #fde68a; color: #1c1c1a; flex-shrink: 0;
}

/* HOME */
#screen-home {
  background: linear-gradient(160deg, #fdf2f8 0%, #fce7f3 100%);
  padding: 28px 16px 40px; align-items: center;
}
.home-logo { text-align: center; max-width: 520px; width: 100%; margin-bottom: 28px; }
.home-icon { font-size: 48px; display: block; margin-bottom: 10px; }
.home-series {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.4em; color: #db2777; text-transform: uppercase; margin-bottom: 10px;
}
.home-title {
  font-size: clamp(34px,8vw,58px); font-weight: 900; color: #1c1c1a; line-height: 1.25; margin-bottom: 8px;
}
.home-title span { color: #db2777; }
.home-sub { font-size: 16px; color: #1c1c1a; font-weight: 700; background:#fde68a; display:inline-block; padding:4px 14px; border-radius:100px; margin-top:6px; }

.grade-section-label {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.3em; color: #1c1c1a; background:white; padding:4px 12px; border-radius:100px;
  max-width: 520px; width: 100%; margin-bottom: 10px; text-align:center;
}
.grade-grid { display: grid; grid-template-columns: 1fr; gap: 10px; max-width: 520px; width: 100%; }
.grade-card {
  border: 2.5px solid #db2777; border-radius: var(--radius); padding: 18px 18px;
  cursor: pointer; position: relative; overflow: hidden; transition: all 0.15s;
  background: white; display:flex; align-items:center; gap:14px; box-shadow: var(--shadow-sm);
}
.grade-card:hover { border-color: #db2777; transform: translate(-1px,-1px); box-shadow: var(--shadow); }
.grade-card.selected { border-color: var(--yellow) !important; box-shadow: 0 0 0 1px var(--yellow); }
.grade-card.locked { opacity: 0.5; cursor: not-allowed; }
.grade-icon { font-size: 32px; flex-shrink:0; }
.grade-info { flex:1; }
.grade-name { font-size: 18px; font-weight: 900; color: #1c1c1a; line-height: 1.2; margin-bottom: 2px; }
.grade-sub { font-size: 12px; color: var(--gray); line-height: 1.4; }
.grade-lock-badge {
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  background: #f3f4f6; color: #9ca3af; padding: 3px 8px; border-radius: 100px;
}

.start-btn-wrap { max-width: 520px; width: 100%; margin-top: 14px; }
.start-btn {
  width: 100%; padding: 16px; background: #fde68a; border: none; color: #1c1c1a;
  font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 900;
  border-radius: var(--radius); cursor: pointer; box-shadow: 3px 3px 0 rgba(255,225,53,0.4); transition: all 0.15s;
}
.start-btn:hover { transform: translate(-1px,-1px); }

/* HUB */
#screen-hub { background: var(--off-white); }
.hub-body { padding: 20px 16px 70px; max-width: 580px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 14px; }

<script>
const APP_ID = 'english';
// ============================================================
// TRIAL & UNLOCK SYSTEM (7-day free trial → paid unlock)
// APP_ID は各アプリのHTMLで個別に定義される（例: 'math', 'kokugo'）
// ============================================================
const TRIAL_DAYS = 7;
const UNLOCK_STORAGE_KEY = 'app_unlocked_' + (typeof APP_ID !== 'undefined' ? APP_ID : 'default');
const BUNDLE_UNLOCK_KEY = 'bundle_unlocked_v1';
const TRIAL_START_KEY = 'app_trial_start_' + (typeof APP_ID !== 'undefined' ? APP_ID : 'default');

function initTrialSystem() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('unlock') === 'yes') {
    // この教科だけを解放
    localStorage.setItem(UNLOCK_STORAGE_KEY, 'true');
  }
  if (params.get('unlock') === 'bundle') {
    // 全教科セット購入 → 全アプリ共通のキーを解放
    // (同一オリジンなので、どのアプリで実行しても全アプリに反映される)
    localStorage.setItem(BUNDLE_UNLOCK_KEY, 'true');
  }
  if (!localStorage.getItem(TRIAL_START_KEY)) {
    localStorage.setItem(TRIAL_START_KEY, Date.now().toString());
  }

function isUnlocked() {
  return localStorage.getItem(UNLOCK_STORAGE_KEY) === 'true'
      || localStorage.getItem(BUNDLE_UNLOCK_KEY) === 'true';

function getTrialDaysLeft() {
  const start = parseInt(localStorage.getItem(TRIAL_START_KEY) || Date.now().toString());
  const elapsed = Date.now() - start;
  const daysElapsed = elapsed / (1000 * 60 * 60 * 24);
  return Math.max(0, Math.ceil(TRIAL_DAYS - daysElapsed));
}

function isTrialActive() {
  return getTrialDaysLeft() > 0;

function isContentAccessible() {

<script>
// ============================================================
// TEXT TO SPEECH
// ============================================================
let currentUtterance = null;

function speak(text, btn) {
  const gender = btn.dataset.gender || 'female';

  // 再生中なら止める
  if (currentUtterance) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.speak-btn').forEach(b => {
      b.textContent = '🔊';
      b.classList.remove('speaking');
    });
    if (btn.dataset.wasSpeaking) {
      delete btn.dataset.wasSpeaking;
      currentUtterance = null;
      return;
    }
  }

  let voices = window.speechSynthesis.getVoices();
  // 声リストがまだ読み込まれていない場合は少し待って再試行
  if (voices.length === 0) {
    window.speechSynthesis.onvoiceschanged = () => speak(text, btn);
    window.speechSynthesis.getVoices();
    return;
  }

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';

  const enVoices = voices.filter(v => v.lang === 'en-US' || v.lang === 'en_US');
  const allEnVoices = voices.filter(v => v.lang.startsWith('en'));

  // iOS/macOS の既知の男性・女性英語ボイス名（優先順）
  const maleNames   = ['Aaron','Gordon','Fred','Ralph','Bruce','Reed','Rishi','Rocko','Thomas','Martin','Daniel'];
  const femaleNames = ['Samantha','Victoria','Karen','Moira','Fiona','Tessa','Zira','Susan','Jenny'];

  let voice = null;
  if (gender === 'male') {
    for (const name of maleNames) {
      voice = (enVoices.concat(allEnVoices)).find(v => v.name.includes(name));
      if (voice) break;
    }
    if (!voice) voice = allEnVoices.find(v => v.name.toLowerCase().includes('male'));
    if (!voice) voice = enVoices[0] || allEnVoices[0];
    // ピッチは変更しない（ピッチシフトが音の歪み・聞き取りにくさの主因）
    utterance.pitch = 1.0;
    utterance.rate  = 0.85;
  } else {
    for (const name of femaleNames) {
      voice = (enVoices.concat(allEnVoices)).find(v => v.name.includes(name));
      if (voice) break;
    }
    if (!voice) voice = allEnVoices.find(v => v.name.toLowerCase().includes('female'));
    if (!voice) voice = enVoices[1] || enVoices[0] || allEnVoices[0];
    utterance.pitch = 1.05;  // わずかに高めのみ（歪み防止のため最小限）
    utterance.rate  = 0.85;
  }

  if (voice) utterance.voice = voice;

  utterance.text = text;

  utterance.onstart = () => {
    btn.textContent = '⏹';
    btn.classList.add('speaking');
    btn.dataset.wasSpeaking = '1';
  };
  utterance.onend = () => {
    btn.textContent = '🔊';
    btn.classList.remove('speaking');
    delete btn.dataset.wasSpeaking;
    currentUtterance = null;
  };
  utterance.onerror = () => {
    btn.textContent = '🔊';
    btn.classList.remove('speaking');
    currentUtterance = null;
  };

  currentUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

// 声のリストを事前に読み込む（必要なブラウザ対応）
window.speechSynthesis.onvoiceschanged = () => {
  window.speechSynthesis.getVoices();
};

function highlightGrammar(text, keyword) {
  var patterns = GRAMMAR_HIGHLIGHTS[keyword];
  if (!patterns || patterns.length === 0) return text;
  var result = text;
  var sorted = patterns.slice().sort(function(a,b){ return b.length - a.length; });
  sorted.forEach(function(pattern) {
    try {
      var escaped = pattern.replace(/[.*+?^${}()|\[\]\\]/g, '\\$&');
      var regex = new RegExp('\\b(' + escaped + ')\\b', 'g');
      result = result.replace(regex, '<span class="grammar-hl">$1</span>');
    } catch(e) {}
  });
  return result;
}

function wrapParens(text) {
  // （）や()の中身を改行禁止にして、入らなければ括弧ごと次の行に送る
  return text.replace(/([（(][^）)]*[）)])/g, '<span style="white-space:nowrap">$1</span>');
}

function formatPattern(text) {
  // 「/」区切りを改行に変換し、括弧の中身も改行禁止にする
  return wrapParens(text.split(/\s*\/\s*/).join('<br>'));
}

function answer(chosen) {
  const q = currentQuiz[currentQuizIdx];
  document.querySelectorAll('.quiz-option').forEach(o=>o.disabled=true);
  const fb = document.getElementById('quiz-feedback');
  if (chosen===q.ans) {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('correct');
    fb.className='quiz-feedback correct-fb show';
    fb.innerHTML=`⭕ Correct!<br>${q.exp}`;
    quizScore++;
  } else {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('wrong');
    document.querySelectorAll('.quiz-option')[q.ans].classList.add('correct');
    fb.className='quiz-feedback wrong-fb show';
    fb.innerHTML=`❌ 不正解。正解は「${q.opts[q.ans]}」<br>${q.exp}`;
  }
  document.getElementById('quiz-next-btn').className='quiz-next-btn show';
}

let vocabSession = [];
let vocabSessionIdx = 0;
let vocabFlipped = false;
let vocabStats = JSON.parse(localStorage.getItem('vocabMastery') || '{}'); // {word: level(0-4)}
let vocabSessionResults = { forgot:0, vague:0, gotIt:0 };

function findExampleSentence(word, ep) {
  // 単語の語幹部分（活用形の括弧などを除去）を抽出して検索
  const baseWord = word.split('(')[0].trim().toLowerCase();
  const candidates = [ep.char1, ep.char2];
  for (const c of candidates) {
    if (c && c.en && c.en.toLowerCase().includes(baseWord)) {
      return { en: c.en, jp: c.jp };
    }
  }
  return null;
}

function getAllVocabForGrade() {
  // 現在の学年の全レッスンから単語を集める（重複は最初の出現を優先）
  const seen = new Set();
  const all = [];
  currentGrade.episodes.forEach(ep => {
    (ep.vocab || []).forEach(([en, jp]) => {
      const key = en.toLowerCase();
      if (!seen.has(key)) {
        seen.add(key);
        const tip = (typeof VOCAB_TIPS !== 'undefined' && VOCAB_TIPS[key]) ? VOCAB_TIPS[key] : null;
        const example = findExampleSentence(en, ep);
        all.push({ en, jp, tip, example });
      }
    });
  });
  return all;
}

function startVocabTraining() {
  const allWords = getAllVocabForGrade();
  if (allWords.length === 0) {
    alert('この学年の単語データがまだありません。');
    return;
  }

  // 定着度が低い単語ほど出やすいように重み付き抽出
  const weighted = [];
  allWords.forEach(w => {
    const level = vocabStats[w.en.toLowerCase()] ?? 0;
    const weight = Math.max(1, 5 - level); // レベル0→重み5、レベル4→重み1
    for (let i = 0; i < weight; i++) weighted.push(w);
  });

  // ランダムに最大12語を重複なしで選ぶ
  const picked = [];
  const pickedKeys = new Set();
  const shuffled = weighted.slice().sort(() => Math.random() - 0.5);
  for (const w of shuffled) {
    if (!pickedKeys.has(w.en) && picked.length < 12) {
      pickedKeys.add(w.en);
      picked.push(w);
    }
  }

  vocabSession = picked;
  vocabSessionIdx = 0;
  vocabSessionResults = { forgot:0, vague:0, gotIt:0 };
  document.getElementById('vocab-result').style.display = 'none';
  document.getElementById('vocab-card-wrap').style.display = 'flex';
  showScreen('vocab');
  renderVocabCard();
}

function renderVocabCard() {
  if (vocabSessionIdx >= vocabSession.length) {
    showVocabResult();
    return;
  }
  const w = vocabSession[vocabSessionIdx];
  vocabFlipped = false;

  document.getElementById('vocab-prog-bar').innerHTML =
    vocabSession.map((_, i) => `<div class="vocab-pd ${i < vocabSessionIdx ? 'done' : i === vocabSessionIdx ? 'current' : ''}"></div>`).join('');

  const level = vocabStats[w.en.toLowerCase()] ?? 0;
  const levelLabels = ['未学習','うろ覚え','まあまあ','覚えた','完璧'];
  document.getElementById('vocab-level-badge').className = `vocab-level-badge lv${level}`;
  document.getElementById('vocab-level-badge').textContent = levelLabels[level];
  document.getElementById('vocab-en').textContent = w.en;
  document.getElementById('vocab-en-small').textContent = w.en;
  document.getElementById('vocab-jp').textContent = w.jp;
  document.getElementById('vocab-tip-text').textContent = w.tip || 'この単語は、何度も繰り返し使って覚えていこう！';

  // 例文ボタンの表示制御（例文が見つかったレッスンのみボタンを出す）
  const exampleBtn = document.getElementById('vocab-example-btn');
  const exampleBox = document.getElementById('vocab-example-box');
  if (w.example) {
    exampleBtn.style.display = 'block';
  } else {
    exampleBtn.style.display = 'none';
  }
  exampleBox.style.display = 'none';
  exampleBtn.textContent = '📝 例文で確認する';

  document.getElementById('vocab-card-front').style.display = 'flex';
  document.getElementById('vocab-card-back').style.display = 'none';
  document.getElementById('vocab-rate-buttons').style.display = 'none';
}

  if (vocabFlipped) return;
  vocabFlipped = true;
  document.getElementById('vocab-card-front').style.display = 'none';
  document.getElementById('vocab-card-back').style.display = 'flex';
  document.getElementById('vocab-rate-buttons').style.display = 'flex';
}

function speakVocabWord() {
  const w = vocabSession[vocabSessionIdx];
  if (!w) return;
  const fakeBtn = { dataset: { gender: 'female' }, textContent: '', classList: { add(){}, remove(){} } };
  speak(w.en, fakeBtn);
}

function toggleVocabExample() {
  const w = vocabSession[vocabSessionIdx];
  const box = document.getElementById('vocab-example-box');
  const btn = document.getElementById('vocab-example-btn');
  const isShowing = box.style.display === 'block';

  if (isShowing) {
    box.style.display = 'none';
    btn.textContent = '📝 例文で確認する';
  } else {
    if (w.example) {
      document.getElementById('vocab-example-en').textContent = w.example.en;
      document.getElementById('vocab-example-jp').textContent = w.example.jp;
    }
    box.style.display = 'block';
    btn.textContent = '📝 例文を閉じる';
  }
}

function speakVocabExample() {
  const w = vocabSession[vocabSessionIdx];
  if (!w || !w.example) return;
  const fakeBtn = { dataset: { gender: 'female' }, textContent: '', classList: { add(){}, remove(){} } };
  speak(w.example.en, fakeBtn);
}

function rateVocabWord(rating) {
  const w = vocabSession[vocabSessionIdx];
  const key = w.en.toLowerCase();
  let level = vocabStats[key] ?? 0;

  if (rating === 0) { level = Math.max(0, level - 1); vocabSessionResults.forgot++; }
  else if (rating === 1) { vocabSessionResults.vague++; } // レベル変化なし（現状維持）
  else { level = Math.min(4, level + 1); vocabSessionResults.gotIt++; }

  vocabStats[key] = level;
  localStorage.setItem('vocabMastery', JSON.stringify(vocabStats));

  vocabSessionIdx++;
  renderVocabCard();
}

function showVocabResult() {
  document.getElementById('vocab-card-wrap').style.display = 'none';
  document.getElementById('vocab-rate-buttons').style.display = 'none';
  document.getElementById('vocab-prog-bar').innerHTML = '';
  const r = vocabSessionResults;
  document.getElementById('vocab-result-stats').innerHTML =
    `😵 まだ覚えてない：${r.forgot}語<br>🤔 うろ覚え：${r.vague}語<br>😊 覚えた！：${r.gotIt}語`;
  document.getElementById('vocab-result').style.display = 'flex';
}
</script>
