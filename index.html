<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文法ってこういうことか！</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Syne:wght@700;800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>:root {
  --white: #ffffff;
  --off-white: #f8f8f6;
  --ink: #1c1c1a;
  --gray: #6b6b68;
  --light-gray: #e8e8e4;

  --grade1-accent: #2563eb;
  --grade1-bg: #dbeafe;
  --grade2-accent: #16a34a;
  --grade2-bg: #dcfce7;
  --grade3-accent: #dc2626;
  --grade3-bg: #fee2e2;

  --coral: #ff5e5b;
  --mint: #00c9a7;
  --yellow: #ffe135;
  --sky: #5bc8f5;
  --lavender: #a78bfa;

  --cur-accent: var(--grade1-accent);
  --cur-bg: var(--grade1-bg);

  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 3px 3px 0 var(--ink);
  --shadow-sm: 2px 2px 0 var(--ink);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--off-white);
  color: var(--ink);
  min-height: 100vh;
}
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

.app-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: #1e3a8a;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 3px solid var(--cur-accent);
}
.back-btn {
  background: none; border: 2px solid rgba(255,255,255,0.6); color: #ffffff;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; padding: 5px 12px; cursor: pointer;
  border-radius: 100px; transition: all 0.15s; flex-shrink: 0;
}
.back-btn:hover { border-color: #fde68a; color: #fde68a; }
.header-title {
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 18px; font-weight: 700;
  color: #ffffff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header-badge {
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
  padding: 4px 10px; border-radius: 100px; background: #fde68a; color: #1c1c1a; flex-shrink: 0;
}

/* HOME */
#screen-home {
  background: linear-gradient(160deg, #1e3a8a 0%, #5b21b6 100%);
  padding: 28px 16px 40px; align-items: center;
}
.home-logo { text-align: center; max-width: 520px; width: 100%; margin-bottom: 28px; }
.home-icon { font-size: 48px; display: block; margin-bottom: 10px; }
.home-series {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.4em; color: #6ee7b7; text-transform: uppercase; margin-bottom: 10px;
}
.home-title {
  font-size: clamp(28px,7vw,48px); font-weight: 900; color: #ffffff; line-height: 1.2; margin-bottom: 6px;
  -webkit-text-stroke: 2px #1e1b4b; paint-order: stroke fill;
}
.home-title span { color: var(--yellow); -webkit-text-stroke: 2px #78350f; paint-order: stroke fill; }
.home-sub { font-size: 16px; color: #1c1c1a; font-weight: 700; background:#fde68a; display:inline-block; padding:4px 14px; border-radius:100px; margin-top:6px; }

.grade-section-label {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.3em; color: #1c1c1a; background:white; padding:4px 12px; border-radius:100px;
  max-width: 520px; width: 100%; margin-bottom: 10px; text-align:center;
}
.grade-grid { display: grid; grid-template-columns: 1fr; gap: 10px; max-width: 520px; width: 100%; }
.grade-card {
  border: 2.5px solid rgba(255,255,255,0.15); border-radius: var(--radius); padding: 18px 18px;
  cursor: pointer; position: relative; overflow: hidden; transition: all 0.15s;
  background: rgba(255,255,255,0.08); display:flex; align-items:center; gap:14px;
}
.grade-card:hover { border-color: rgba(255,255,255,0.4); transform: translate(-1px,-1px); }
.grade-card.selected { border-color: var(--yellow) !important; box-shadow: 0 0 0 1px var(--yellow); }
.grade-card.locked { opacity: 0.5; cursor: not-allowed; }
.grade-icon { font-size: 32px; flex-shrink:0; }
.grade-info { flex:1; }
.grade-name { font-size: 17px; font-weight: 900; color: white; line-height: 1.2; margin-bottom: 2px; }
.grade-sub { font-size: 11px; color: rgba(255,255,255,0.6); line-height: 1.4; }
.grade-lock-badge {
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); padding: 3px 8px; border-radius: 100px;
}

.start-btn-wrap { max-width: 520px; width: 100%; margin-top: 14px; }
.start-btn {
  width: 100%; padding: 16px; background: #fde68a; border: none; color: #1c1c1a;
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 900;
  border-radius: var(--radius); cursor: pointer; box-shadow: 3px 3px 0 rgba(255,225,53,0.4); transition: all 0.15s;
}
.start-btn:hover { transform: translate(-1px,-1px); }

/* HUB */
#screen-hub { background: var(--off-white); }
.hub-body { padding: 20px 16px 32px; max-width: 580px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 14px; }
.hub-hero { background: linear-gradient(135deg, #1e3a8a 0%, #5b21b6 100%); border-radius: var(--radius); padding: 24px 20px; position: relative; overflow: hidden; }
.hub-grade-icon { font-size: 36px; display: block; margin-bottom: 10px; }
.hub-grade-title { font-size: clamp(20px,5vw,30px); font-weight: 900; color: white; line-height: 1.2; margin-bottom: 6px; -webkit-text-stroke: 1.5px rgba(0,0,0,0.35); paint-order: stroke fill; }
.hub-grade-title span { color: var(--yellow); }
.hub-grade-sub { font-size: 16px; color: #e0e7ff; }

.hub-mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.hub-mode-btn { background: white; border: 2.5px solid var(--ink); border-radius: var(--radius); padding: 16px 12px; cursor: pointer; text-align: center; box-shadow: var(--shadow-sm); transition: all 0.15s; }
.hub-mode-btn:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow); }
.hub-mode-btn.primary { background: var(--cur-accent); border-color: var(--cur-accent); color: white; }
.hub-mode-icon { font-size: 24px; display: block; margin-bottom: 6px; }
.hub-mode-label { font-size: 16px; font-weight: 900; display: block; margin-bottom: 2px; }
.hub-mode-desc { font-size: 14px; color: var(--gray); line-height: 1.4; }
.hub-mode-btn.primary .hub-mode-desc { color: rgba(255,255,255,0.8); }

.hub-progress-wrap { background: white; border: 2.5px solid var(--ink); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm); }
.hub-progress-label { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.2em; color: #1d4ed8; text-transform: uppercase; margin-bottom: 8px; }
.hub-dots { display: flex; gap: 6px; flex-wrap: wrap; }
.hub-dot { width: 28px; height: 28px; border: 2px solid var(--light-gray); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; color: var(--gray); cursor: pointer; transition: all 0.2s; }
.hub-dot.read { background: var(--cur-accent); border-color: var(--cur-accent); color: white; }
.hub-dot.quiz-done { background: var(--coral); border-color: var(--coral); color: white; }

/* EPISODE LIST */
#screen-list { background: var(--off-white); }
.ep-list-body { padding: 12px 16px; max-width: 580px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 6px; }
.ep-card { background: white; border: 2.5px solid var(--ink); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; box-shadow: var(--shadow-sm); transition: all 0.1s; display: flex; align-items: center; gap: 12px; }
.ep-card:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow); }
.ep-card.read { background: var(--off-white); }
.ep-num { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--cur-accent); min-width: 36px; letter-spacing: 0.05em; }
.ep-info { flex: 1; }
.ep-card-title { font-size: 18px; font-weight: 900; color: var(--ink); margin-bottom: 2px; }
.ep-card-sub { font-size: 15px; color: var(--gray); }
.ep-badge { font-size: 16px; }

/* READER */
#screen-reader { background: var(--off-white); }
.lang-toggle-btn { background: #fde68a; border: 2px solid var(--ink); color: var(--ink); font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; padding: 6px 14px; border-radius: 100px; cursor: pointer; box-shadow: 2px 2px 0 var(--ink); transition: all 0.15s; flex-shrink: 0; }
.lang-toggle-btn:hover { transform: translate(-1px,-1px); }
.quiz-trigger-btn { background: #f87171; border: none; color: white; font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 6px 14px; border-radius: 100px; cursor: pointer; box-shadow: 2px 2px 0 rgba(255,94,91,0.4); transition: all 0.15s; flex-shrink: 0; }

.manga-content { max-width: 680px; margin: 0 auto; padding: 16px; width: 100%; }
.manga-wrap { display: flex; flex-direction: column; gap: 4px; }

.m-cover { background: linear-gradient(135deg, #1e3a8a 0%, #5b21b6 100%); border-radius: var(--radius); padding: 32px 24px 24px; position: relative; overflow: hidden; margin-bottom: 4px; }
.m-cover-series { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.35em; color:#6ee7b7; text-transform:uppercase; margin-bottom:10px; -webkit-text-stroke: 0.5px rgba(0,0,0,0.4); paint-order: stroke fill; }
.m-cover-ep { display:inline-block; background:var(--yellow); color:var(--ink); font-family:'Syne',sans-serif; font-size:12px; font-weight:800; letter-spacing:0.15em; padding:3px 12px; border-radius:100px; margin-bottom:12px; }
.m-cover-title { font-size:clamp(24px,5vw,40px); font-weight:900; color:white; line-height:1.2; margin-bottom:8px; position:relative; z-index:1; -webkit-text-stroke: 1.5px rgba(0,0,0,0.35); paint-order: stroke fill; }
.m-cover-title .hl { color:var(--yellow); }
.m-cover-sub { font-size:16px; font-weight:500; color:#e0e7ff; border-left:3px solid var(--coral); padding-left:10px; position:relative; z-index:1; }

.m-page { display:flex; flex-direction:column; gap:4px; }
.m-panel { background:white; border-radius:var(--radius); border:2.5px solid var(--ink); box-shadow:var(--shadow-sm); overflow:hidden; position:relative; }
.m-panel-inner { padding:16px; display:flex; flex-direction:column; gap:10px; }

.m-narr { background:#4f46e5; color:white; font-size:16px; font-weight:700; line-height:1.7; padding:8px 14px; border-radius:var(--radius-sm); align-self:flex-start; }
.m-narr.accent { background: var(--mint); color: var(--ink); }
.m-narr.tone { background: var(--cur-accent); color: white; }
.m-narr.right { align-self:flex-end; }

.m-scene { position:absolute; top:0; left:0; background:var(--coral); color:white; font-size:13px; font-weight:700; letter-spacing:0.15em; padding:4px 12px; border-radius:0 0 var(--radius-sm) 0; }

.m-bubble-wrap { display:flex; align-items:flex-start; gap:8px; }
.m-bubble-wrap.right { flex-direction:row-reverse; }
.m-char-col { display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; }
.m-char-icon { width:52px; height:52px; border-radius:50%; border:2.5px solid var(--ink); display:flex; align-items:center; justify-content:center; font-size:26px; }
.m-char-icon.a { background:#fde8d8; }
.m-char-icon.b { background:#dbeafe; }
.m-char-name { font-size:13px; font-weight:700; color:var(--gray); text-align:center; white-space:nowrap; }

.m-bubble { background:white; border:2px solid var(--ink); border-radius:14px; padding:12px 16px; font-size:19px; line-height:1.6; font-weight:700; max-width:calc(100% - 62px); position:relative; box-shadow:var(--shadow-sm); }
.m-bubble .jp-line { display:block; font-size:14px; font-weight:500; color:#6b7280; margin-top:5px; border-top: 1px dashed #d1d5db; padding-top: 5px; }
.m-bubble.jp-hidden .jp-line { display: none; }
.m-bubble::before { content:''; position:absolute; top:13px; left:-8px; border:5px solid transparent; border-right-color:var(--ink); }
.m-bubble::after { content:''; position:absolute; top:14px; left:-5px; border:4px solid transparent; border-right-color:white; }
.m-bubble-wrap.right .m-bubble::before { left:auto; right:-8px; border-right-color:transparent; border-left-color:var(--ink); }
.m-bubble-wrap.right .m-bubble::after { left:auto; right:-5px; border-right-color:transparent; border-left-color:white; }

.m-grammar-box { background: #1e1b4b; border-radius: var(--radius); padding: 18px 20px; position: relative; overflow: hidden; }
.m-grammar-box::before { content:''; position:absolute; top:-24px; right:-24px; width:100px; height:100px; background:#818cf8; border-radius:50%; opacity:0.15; }
.m-grammar-label { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.3em; color:#fde68a; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; -webkit-text-stroke: 0.5px rgba(0,0,0,0.4); paint-order: stroke fill; }
.m-grammar-label::before { content:''; display:block; width:16px; height:2px; background:#fde68a; }
.m-grammar-pattern { background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.3); border-radius: 10px; padding: 14px 18px; font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 700; color: #fde68a; text-align: center; margin-bottom: 12px; }
.m-grammar-text { font-size:16px; line-height:1.9; color:#f1f5f9; font-weight:500; position:relative; z-index:1; }
.m-grammar-text strong { color: #fde68a; font-weight: 700; }
.m-grammar-text .ex { display: block; background: rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 14px; margin: 8px 0; font-family: 'Syne', sans-serif; font-size: 15px; }

.m-vocab-box { background: #ecfccb; border: 2.5px solid #4d7c0f; border-radius: var(--radius); padding: 16px 18px; }
.m-vocab-label { font-size: 11px; font-weight: 700; color: #4d7c0f; letter-spacing: 0.15em; margin-bottom: 10px; }
.m-vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.m-vocab-item { font-size: 15px; font-weight: 700; color: #1c1c1a; }
.m-vocab-item .jp { color: #4d7c0f; font-weight: 500; font-size: 14px; }

.m-footer { background: #1e3a8a; border-radius: var(--radius); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; margin-top: 4px; transition: all 0.15s; }
.m-footer:hover { background: #1e40af; transform: translate(-1px,-1px); box-shadow: 2px 2px 0 var(--coral); }
.m-footer-next { font-size: 13px; font-weight: 700; color: #fecaca; -webkit-text-stroke: 0.5px rgba(0,0,0,0.3); paint-order: stroke fill; }
.m-footer-num { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: #fde68a; -webkit-text-stroke: 0.5px rgba(0,0,0,0.3); paint-order: stroke fill; }

/* QUIZ */
#screen-quiz { background: var(--off-white); }
#screen-quiz .app-header { background: var(--coral); border-bottom-color: #c0392b; }
.quiz-body { padding: 16px; max-width: 580px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; }
.quiz-prog-bar { display:flex; gap:4px; margin-bottom:16px; }
.quiz-pd { flex:1; height:4px; background:var(--light-gray); border-radius:2px; transition:background 0.3s; }
.quiz-pd.done { background:var(--coral); }
.quiz-pd.current { background:var(--cur-accent); }
.quiz-ep-label { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.15em; color:#1d4ed8; text-transform:uppercase; margin-bottom:8px; }
.quiz-question { background:white; border:2.5px solid var(--ink); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow-sm); font-size:19px; font-weight:900; color:var(--ink); line-height:1.6; margin-bottom:14px; }
.quiz-options { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
.quiz-option { background:white; border:2.5px solid var(--ink); border-radius:var(--radius); padding:14px 16px; font-size:17px; font-weight:700; color:var(--ink); text-align:left; cursor:pointer; box-shadow:var(--shadow-sm); transition:all 0.1s; font-family:'Zen Maru Gothic',sans-serif; }
.quiz-option:hover:not(:disabled) { transform:translate(-1px,-1px); box-shadow:var(--shadow); }
.quiz-option.correct { background:#dcfce7; border-color:#16a34a; box-shadow:2px 2px 0 #16a34a; }
.quiz-option.wrong { background:#fee2e2; border-color:var(--coral); box-shadow:2px 2px 0 var(--coral); }
.quiz-option:disabled { cursor:default; transform:none; }
.quiz-feedback { display:none; padding:14px 16px; border:2.5px solid var(--ink); border-radius:var(--radius); font-size:15px; font-weight:700; line-height:1.7; margin-bottom:12px; }
.quiz-feedback.show { display:block; }
.quiz-feedback.correct-fb { background:#dcfce7; border-color:#16a34a; }
.quiz-feedback.wrong-fb { background:#fee2e2; border-color:var(--coral); }
.quiz-next-btn { background:var(--ink); border:none; color:white; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.1em; padding:13px 22px; border-radius:100px; cursor:pointer; box-shadow:2px 2px 0 var(--cur-accent); align-self:flex-end; display:none; transition:all 0.15s; }
.quiz-next-btn.show { display:block; }
.quiz-next-btn:hover { transform:translate(-1px,-1px); }
.quiz-result { display:none; flex-direction:column; align-items:center; padding:28px 16px; text-align:center; gap:12px; }
.quiz-result.show { display:flex; }
.result-stamp { font-size:52px; animation:stampIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes stampIn { from{transform:scale(3);opacity:0} to{transform:scale(1);opacity:1} }
.result-score { font-family:'Syne',sans-serif; font-size:64px; font-weight:800; color:#ef4444; line-height:1; }
.result-label { font-size:20px; font-weight:900; color:var(--ink); }
.result-sub { font-size:16px; color:var(--gray); line-height:1.7; }
.result-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.result-btn { border:2.5px solid var(--ink); background:white; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.1em; padding:11px 20px; border-radius:100px; cursor:pointer; box-shadow:var(--shadow-sm); transition:all 0.15s; }
.result-btn:hover { transform:translate(-1px,-1px); box-shadow:var(--shadow); }
.result-btn.primary { background:var(--ink); color:white; border-color:var(--cur-accent); box-shadow:2px 2px 0 var(--cur-accent); }

@media(max-width:480px) {
  .m-vocab-grid { grid-template-columns: 1fr; }
}
.panel, .m-cover, .m-grammar-box { animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* SPEAK BUTTON */
.speak-btn {
  display: inline-flex; align-items: center; justify-content: center;
  margin-top: 8px; margin-left: 2px;
  width: 32px; height: 32px;
  background: #eff6ff; border: 1.5px solid #2563eb;
  border-radius: 50%; font-size: 14px;
  cursor: pointer; transition: all 0.15s;
  vertical-align: middle;
}
.speak-btn:hover { background: #dbeafe; transform: scale(1.1); }
.speak-btn.speaking {
  background: #2563eb; border-color: #1d4ed8;
  animation: pulse-speak 0.8s ease-in-out infinite;
}
@keyframes pulse-speak {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* GRAMMAR HIGHLIGHT */
.grammar-hl {
  color: #dc2626;
  font-weight: 900;
  border-bottom: 2px solid #fca5a5;
  padding-bottom: 1px;
}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="screen-home" class="screen active">
  <div class="home-logo">
    <span class="home-icon">📘</span>
    <div class="home-series">Story Grammar Series</div>
    <div class="home-title">英文法って<br><span>こういうことか！</span></div>
    <div class="home-sub">会話×クイズで中学英文法をマスターしよう</div>
  </div>
  <div class="grade-section-label">学年を選んでください</div>
  <div class="grade-grid" id="grade-grid"></div>
  <div class="start-btn-wrap">
    <button class="start-btn" id="start-btn" onclick="goToHub()">「中学1年生」で学ぶ ▶</button>
  </div>
</div>

<!-- ===== HUB ===== -->
<div id="screen-hub" class="screen">
  <div class="app-header">
    <button class="back-btn" onclick="showScreen('home')">← 学年選択</button>
    <div class="header-title" id="hub-header-title"></div>
  </div>
  <div class="hub-body">
    <div class="hub-hero">
      <span class="hub-grade-icon" id="hub-icon"></span>
      <div class="hub-grade-title" id="hub-title"></div>
      <div class="hub-grade-sub" id="hub-sub"></div>
    </div>
    <div class="hub-mode-grid">

<script>
// ============================================================
// TEXT TO SPEECH
// ============================================================
let currentUtterance = null;

function speak(text, btn) {
  const gender = btn.dataset.gender || 'female';

  // 再生中なら止める
  if (currentUtterance) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.speak-btn').forEach(b => {
      b.textContent = '🔊';
      b.classList.remove('speaking');
    });
    if (btn.dataset.wasSpeaking) {
      delete btn.dataset.wasSpeaking;
      currentUtterance = null;
      return;
    }
  }

  let voices = window.speechSynthesis.getVoices();
  // 声リストがまだ読み込まれていない場合は少し待って再試行
  if (voices.length === 0) {
    window.speechSynthesis.onvoiceschanged = () => speak(text, btn);
    window.speechSynthesis.getVoices();
    return;
  }

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';

  const enVoices = voices.filter(v => v.lang === 'en-US' || v.lang === 'en_US');
  const allEnVoices = voices.filter(v => v.lang.startsWith('en'));

  // iOS/macOS の既知の男性・女性英語ボイス名（優先順）
  const maleNames   = ['Aaron','Gordon','Fred','Ralph','Bruce','Reed','Rishi','Rocko','Thomas','Martin','Daniel'];
  const femaleNames = ['Samantha','Victoria','Karen','Moira','Fiona','Tessa','Zira','Susan','Jenny'];

  let voice = null;
  if (gender === 'male') {
    for (const name of maleNames) {
      voice = (enVoices.concat(allEnVoices)).find(v => v.name.includes(name));
      if (voice) break;
    }
    if (!voice) voice = allEnVoices.find(v => v.name.toLowerCase().includes('male'));
    if (!voice) voice = enVoices[0] || allEnVoices[0];
    // ピッチは変更しない（ピッチシフトが音の歪み・聞き取りにくさの主因）
    utterance.pitch = 1.0;
    utterance.rate  = 0.85;
  } else {
    for (const name of femaleNames) {
      voice = (enVoices.concat(allEnVoices)).find(v => v.name.includes(name));
      if (voice) break;
    }
    if (!voice) voice = allEnVoices.find(v => v.name.toLowerCase().includes('female'));
    if (!voice) voice = enVoices[1] || enVoices[0] || allEnVoices[0];
    utterance.pitch = 1.05;  // わずかに高めのみ（歪み防止のため最小限）
    utterance.rate  = 0.85;
  }

  if (voice) utterance.voice = voice;

  utterance.text = text;

  utterance.onstart = () => {
    btn.textContent = '⏹';
    btn.classList.add('speaking');
    btn.dataset.wasSpeaking = '1';
  };
  utterance.onend = () => {
    btn.textContent = '🔊';
    btn.classList.remove('speaking');
    delete btn.dataset.wasSpeaking;
    currentUtterance = null;
  };
  utterance.onerror = () => {
    btn.textContent = '🔊';
    btn.classList.remove('speaking');
    currentUtterance = null;
  };

  currentUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

function highlightGrammar(text, keyword) {
  var patterns = GRAMMAR_HIGHLIGHTS[keyword];
  if (!patterns || patterns.length === 0) return text;
  var result = text;
  var sorted = patterns.slice().sort(function(a,b){ return b.length - a.length; });
  sorted.forEach(function(pattern) {
    try {
      var escaped = pattern.replace(/[.*+?^${}()|\[\]\\]/g, '\\$&');
      var regex = new RegExp('\\b(' + escaped + ')\\b', 'g');
      result = result.replace(regex, '<span class="grammar-hl">$1</span>');
    } catch(e) {}
  });
  return result;
}

        <div class="m-bubble-wrap">
          <div class="m-char-col"><div class="m-char-icon a">${c1.icon}</div><div class="m-char-name">${c1.name}</div></div>
          <div class="m-bubble">${highlightGrammar(c1.en, ep.keyword)}<span class="jp-line">${c1.jp}</span><button class="speak-btn" onclick="speak(this.dataset.text,this)" data-text="${c1.en.replace(/"/g,'&quot;')}" data-gender="${c1.name==='Mia'?'female':'male'}">🔊</button></div>
        </div>
        <div class="m-bubble-wrap right">
          <div class="m-char-col"><div class="m-char-icon b">${c2.icon}</div><div class="m-char-name">${c2.name}</div></div>
          <div class="m-bubble">${highlightGrammar(c2.en, ep.keyword)}<span class="jp-line">${c2.jp}</span><button class="speak-btn" onclick="speak(this.dataset.text,this)" data-text="${c2.en.replace(/"/g,'&quot;')}" data-gender="${c2.name==='Mia'?'female':'male'}">🔊</button></div>
        </div>
      </div>
    </div>

    <div class="m-grammar-box">
      <div class="m-grammar-label">${ep.grammarLabel}</div>
      <div class="m-grammar-pattern">${ep.grammarPattern}</div>
      <div class="m-grammar-text">${ep.grammarText}</div>
    </div>

    <div class="m-vocab-box">
      <div class="m-vocab-label">📝 VOCABULARY</div>
      <div class="m-vocab-grid">${vocabHtml}</div>
    </div>
  </div>

  <div class="m-footer" onclick="startQuizForCurrentEp()" style="cursor:pointer">
    <div class="m-footer-next">クイズで「${ep.keyword}」を確認しよう！ ▶</div>
    <div class="m-footer-num">L.${ep.id} / 了</div>
  </div>
</div>`;
}

// ============================================================
// QUIZ
// ============================================================
function startQuizForCurrentEp() { startQuiz(currentGradeId, currentEpIdx); }
function startRandomQuiz() { startQuiz(currentGradeId, Math.floor(Math.random()*currentGrade.episodes.length)); }

function startQuiz(gradeId, epIdx) {
  lastQuizGradeId = gradeId;
  lastQuizEpIdx = epIdx;
  const grade = GRADES.find(g=>g.id===gradeId);
  const ep = grade.episodes[epIdx];
  currentQuiz = [...ep.quiz];
  currentQuizIdx = 0;
  quizScore = 0;
  ['quiz-question','quiz-options','quiz-feedback','quiz-next-btn','quiz-prog-bar','quiz-ep-label']
    .forEach(id => { document.getElementById(id).style.display=''; });
  document.getElementById('quiz-result').className = 'quiz-result';
  document.getElementById('quiz-ep-label').textContent = `📘 ${grade.name} L.${ep.id} 「${ep.keyword}」`;
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  const q = currentQuiz[currentQuizIdx];
  document.getElementById('quiz-prog-bar').innerHTML =
    currentQuiz.map((_,i)=>`<div class="quiz-pd ${i<currentQuizIdx?'done':i===currentQuizIdx?'current':''}"></div>`).join('');
  document.getElementById('quiz-question').textContent = q.q;
  document.getElementById('quiz-options').innerHTML =
    q.opts.map((o,i)=>`<button class="quiz-option" onclick="answer(${i})">${o}</button>`).join('');
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-next-btn').className = 'quiz-next-btn';
}

function answer(chosen) {
  const q = currentQuiz[currentQuizIdx];
  document.querySelectorAll('.quiz-option').forEach(o=>o.disabled=true);
  const fb = document.getElementById('quiz-feedback');
  if (chosen===q.ans) {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('correct');
    fb.className='quiz-feedback correct-fb show';
    fb.innerHTML=`⭕ Correct!<br>${q.exp}`;
    quizScore++;
  } else {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('wrong');
    document.querySelectorAll('.quiz-option')[q.ans].classList.add('correct');
    fb.className='quiz-feedback wrong-fb show';
    fb.innerHTML=`❌ 不正解。正解は「${q.opts[q.ans]}」<br>${q.exp}`;
  }
  document.getElementById('quiz-next-btn').className='quiz-next-btn show';
}

function nextQuestion() {
  currentQuizIdx++;
  if(currentQuizIdx>=currentQuiz.length) showResult();
  else renderQuestion();
}

function showResult() {
  ['quiz-question','quiz-options','quiz-feedback','quiz-next-btn','quiz-prog-bar','quiz-ep-label']
    .forEach(id=>{ document.getElementById(id).style.display='none'; });
  const grade = GRADES.find(g=>g.id===lastQuizGradeId);
  const ep = grade.episodes[lastQuizEpIdx];
  if(!quizMap[lastQuizGradeId]) quizMap[lastQuizGradeId]={};
  quizMap[lastQuizGradeId][lastQuizEpIdx]=quizScore;
  localStorage.setItem('engQuizMap',JSON.stringify(quizMap));
  const stamps=['😢','😅','😊','🎉'];
  const labels=['もう一度読んでみよう！','もう少し！','よくできました！','満点！パーフェクト！'];
  const si=quizScore===3?3:quizScore>=2?2:quizScore===1?1:0;
  document.getElementById('result-stamp').textContent=stamps[si];
  document.getElementById('result-score').textContent=`${quizScore}/3`;
  document.getElementById('result-label').textContent=labels[si];
  document.getElementById('result-sub').textContent=`${grade.name} L.${ep.id}「${ep.keyword}」のクイズ結果`;
  document.getElementById('quiz-result').className='quiz-result show';
}

function retryQuiz() { startQuiz(lastQuizGradeId,lastQuizEpIdx); }

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
  if(name==='home') initGradeGrid();
  if(name==='hub') renderHub();
}

// ============================================================
// BOOT
// ============================================================
selectGrade('g1');
initGradeGrid();
</script>
